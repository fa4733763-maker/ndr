<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>

  <!-- Open Graph (preview X) -->
  <meta property="og:title" content="Wait... 👀🔥">
  <meta property="og:description" content="Loading something special...">
  <meta property="og:image" content="https://raw.githubusercontent.com/fa4733763-maker/ndr/main/preview.jpg">
  <meta property="og:url" content="https://getmysocial.com/andmadison">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    img {
      max-width: 90%;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .loader {
      width: 80%;
      max-width: 300px;
      height: 6px;
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff0055, #ff9900);
      animation: load 1.2s linear forwards;
    }

    @keyframes load {
      from { width: 0%; }
      to { width: 100%; }
    }

    .text {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>

  <script>
    // Redirection douce après 1.2s
    setTimeout(() => {
      window.location.href = "step2.html";
    }, 1200);
  </script>

</head>
<body>

  <img src="https://raw.githubusercontent.com/fa4733763-maker/ndr/main/preview.jpg" alt="preview">

  <div class="loader">
    <div class="progress"></div>
  </div>

  <div class="text">Loading secure content...</div>

</body>
</html>
